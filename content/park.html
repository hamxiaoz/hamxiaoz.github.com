<style>
.park-overlay {
  min-height: 80vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.park-list {
  display: flex;
  align-items: center;
  gap: 2.5rem;
}
.park-item {
  display: inline-block;
  vertical-align: middle;
  transform: perspective(1px) translateZ(0);
  position: relative;
  transition: transform 0.3s;
}
.park-item::before {
  pointer-events: none;
  position: absolute;
  z-index: -1;
  content: '';
  top: 100%;
  left: 5%;
  height: 10px;
  width: 90%;
  opacity: 0;
  background: radial-gradient(ellipse at center, rgba(0,0,0,0.35) 0%, transparent 80%);
  transition: transform 0.3s, opacity 0.3s;
}
.park-item:hover,
.park-item:focus,
.park-item:active {
  transform: translateY(-5px);
}
.park-item:hover::before,
.park-item:focus::before,
.park-item:active::before {
  opacity: 1;
  transform: translateY(5px);
}
.park-item a {
  display: block;
  color: inherit;
  text-decoration: none;
}
.park-item .placeholder {
  opacity: 0.15;
  cursor: default;
}
</style>
