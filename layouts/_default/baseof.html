<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang | default "en" }}">

  {{ partial "head.html" . }}
  {{ block "head-extra" . }}{{ end }}
</head>

  <body class="theme-{{ .Site.Params.theme | default "zurassic" }}{{ if .IsHome }} page-home{{ end }}{{ if .Params.hide_nav_links }} page-hidden-nav{{ end }}">

    {{ partial "nav.html" . }}

    <main>
      {{ block "main" . }}{{ end }}
    </main>

    {{ if not .Params.hide_footer }}{{ partial "footer.html" . }}{{ end }}

  </body>

</html>
