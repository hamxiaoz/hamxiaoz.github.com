{{ $section := .Section }}
{{ $blogSection := or (eq $section "posts") (eq .RelPermalink "/blog/") }}
<nav class="site-nav" id="site-nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <img src="/assets/images/zurassic.png" alt="{{ .Site.Params.name | default .Site.Title }}">
    </a>
    {{ if not .Params.hide_nav_links }}
    <div class="nav-links">
      <a href="/work/" class="nav-link{{ if eq $section "work" }} active{{ end }}">Work</a>
      <a href="/writing/" class="nav-link{{ if eq $section "writing" }} active{{ end }}">Writing</a>
      <a href="/projects/" class="nav-link{{ if eq $section "projects" }} active{{ end }}">Projects</a>
      <a href="/making/" class="nav-link{{ if eq $section "making" }} active{{ end }}">Making</a>
      <a href="/blog/" class="nav-link nav-link-cn{{ if $blogSection }} active{{ end }}">博客</a>
    </div>
    {{ end }}
  </div>
</nav>
