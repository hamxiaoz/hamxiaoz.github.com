<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{{ if .IsPage }}{{ .Title | htmlEscape }} | {{ end }}{{ .Site.Title | htmlEscape }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- All theme fonts (loaded together so ?theme= switching works without reload) -->
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Lato:ital,wght@0,400;0,700;1,400&family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Legacy CSS (blog, ann, books pages) -->
  <link rel="stylesheet" href="/assets/icons.css">
  <link rel="stylesheet" href="/assets/layout.css">
  {{ $css := resources.Get "main.scss" | toCSS | fingerprint }}
  <link rel="stylesheet" href="{{ $css.RelPermalink }}">
  <link rel="stylesheet" href="/assets/syntax.css">

  <!-- Portfolio theme CSS (id allows JS to swap it via ?theme= param) -->
  <link rel="stylesheet" href="/css/base.css">
  {{ $theme := .Site.Params.theme | default "zurassic" }}
  <link id="theme-css" rel="stylesheet" href="/css/{{ $theme }}.css">

  <!-- Theme switcher: reads ?theme=apple|te|zurassic and swaps CSS + body class -->
  <script>
    (function() {
      var allowed = { apple: 1, te: 1, zurassic: 1 };
      var param = new URLSearchParams(window.location.search).get('theme');
      if (param && allowed[param]) {
        document.getElementById('theme-css').href = '/css/' + param + '.css';
        document.addEventListener('DOMContentLoaded', function() {
          document.body.className = document.body.className.replace(/theme-\w+/, 'theme-' + param);
        });
      }
    })();
  </script>

  <link rel="canonical" href="{{ .Permalink }}">
  {{ with .OutputFormats.Get "RSS" }}
    <link rel="alternate" type="application/rss+xml" title="{{ $.Site.Title | htmlEscape }}" href="{{ .Permalink }}">
  {{ end }}

  <script src="/assets/js/site.js" defer></script>

  {{ if hugo.IsProduction }}
    {{ with .Site.Params.googleAnalytics }}
      {{ partial "google-analytics.html" $ }}
    {{ end }}
  {{ end }}
</head>
