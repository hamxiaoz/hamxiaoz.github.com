{{ define "main" }}
<section class="portfolio-section section-page section-writing reveal-section">
  <div class="section-inner">
    <div class="section-header reveal">
      <h1 class="section-title">Writing.</h1>
      <p class="section-subtitle">{{ .Description | default "On leadership, engineering, and the spaces in between." }}</p>
    </div>
    <div class="items-list">
      {{ range .Pages.ByDate.Reverse }}
        {{ partial "list-item.html" . }}
      {{ end }}
    </div>
  </div>
</section>

<script>
(function() {
  var els = document.querySelectorAll('.reveal');
  if (!els.length) return;
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) { e.target.classList.add('is-visible'); obs.unobserve(e.target); }
    });
  }, { threshold: 0.1 });
  els.forEach(function(el) { obs.observe(el); });
})();
</script>
{{ end }}
